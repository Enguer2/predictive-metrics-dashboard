version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sentinel-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sentinel_ops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: dashboard-api
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/sentinel_ops

  frontend:
    build: ./frontend
    container_name: dashboard-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: