version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dashboard-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: dashboard-api
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}

  frontend:
    build: ./frontend
    container_name: dashboard-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - HOST=0.0.0.0
      - PORT=3000

volumes:
  postgres_data: